name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Update cask file
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA_ARM: ${{ github.event.client_payload.sha_arm }}
          SHA_INTEL: ${{ github.event.client_payload.sha_intel }}
        run: |
          mkdir -p Casks
          cat > Casks/ccx-desktop.rb << 'RUBY_HEAD'
          cask "ccx-desktop" do
            arch arm: "arm64", intel: "amd64"
          RUBY_HEAD

          cat >> Casks/ccx-desktop.rb << RUBY_BODY
            version "${VERSION}"
            sha256 arm:   "${SHA_ARM}",
                   intel: "${SHA_INTEL}"

            url "https://github.com/BenedictKing/ccx/releases/download/v#{version}/CCX-Desktop-#{version}-darwin-#{arch}.dmg",
                verified: "github.com/BenedictKing/ccx/"
            name "CCX Desktop"
            desc "Multi-upstream AI API proxy and protocol conversion gateway"
            homepage "https://github.com/BenedictKing/ccx"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: :catalina

            app "CCX Desktop.app"
          end
          RUBY_BODY

          # Remove heredoc leading whitespace
          sed -i 's/^          //' Casks/ccx-desktop.rb

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ccx-desktop.rb
          if git diff --staged --quiet; then
            echo "No changes - cask already at v${VERSION}"
          else
            git commit -m "Update ccx-desktop to v${VERSION}"
            git push
            echo "Updated cask to v${VERSION}"
          fi
