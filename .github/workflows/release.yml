name: Release
permissions:
  actions: read
  contents: write
  id-token: write

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-backend:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build Frontend
        run: bun install --frozen-lockfile && bun run build
        working-directory: ./frontend

      - name: Copy Frontend to Backend
        run: |
          rm -rf backend-go/frontend/dist
          mkdir -p backend-go/frontend/dist
          cp -r frontend/dist/* backend-go/frontend/dist/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend-go/go.sum

      - name: Import macOS signing certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          missing=0
          for name in MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD MACOS_KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required macOS signing secret: $name" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/ccx-signing.keychain-db"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 -d > "$CERTIFICATE_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"

      - name: Build Backend arm64
        run: |
          go mod download
          CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.GitCommit=${{ github.sha }}" -o ccx-darwin-arm64
        working-directory: ./backend-go

      - name: Build Backend amd64
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.GitCommit=${{ github.sha }}" -o ccx-darwin-amd64
        working-directory: ./backend-go

      - name: Sign Backend binaries
        env:
          MACOS_CODESIGN_IDENTITY: "Developer ID Application: Wang Zhiwei (PZV79TYXCR)"
        run: |
          codesign --force --timestamp --options runtime --sign "$MACOS_CODESIGN_IDENTITY" backend-go/ccx-darwin-arm64
          codesign --force --timestamp --options runtime --sign "$MACOS_CODESIGN_IDENTITY" backend-go/ccx-darwin-amd64
          codesign --verify --strict --verbose=4 backend-go/ccx-darwin-arm64
          codesign --verify --strict --verbose=4 backend-go/ccx-darwin-amd64

      - name: Generate backend checksums
        run: |
          cd backend-go
          shasum -a 256 ccx-darwin-arm64 | awk '{print $1}' > ccx-darwin-arm64.sha256
          shasum -a 256 ccx-darwin-amd64 | awk '{print $1}' > ccx-darwin-amd64.sha256

      - name: Upload macOS backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-backend
          path: |
            backend-go/ccx-darwin-arm64
            backend-go/ccx-darwin-amd64
            backend-go/ccx-darwin-arm64.sha256
            backend-go/ccx-darwin-amd64.sha256
          retention-days: 1

  build-macos-desktop:
    runs-on: macos-latest
    needs: build-macos-backend
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, amd64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache desktop Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-desktop-bun-${{ hashFiles('desktop/frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-desktop-bun-
            ${{ runner.os }}-bun-

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: desktop/go.sum

      - name: Install Wails3 CLI
        run: bash ./scripts/install-wails3.sh

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Desktop Frontend Deps
        run: bun install --frozen-lockfile
        working-directory: ./desktop/frontend

      - name: Download macOS backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-backend
          path: backend-go

      - name: Restore backend executable permissions
        run: chmod +x backend-go/ccx-darwin-arm64 backend-go/ccx-darwin-amd64

      - name: Import macOS signing certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          missing=0
          for name in MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD MACOS_KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required macOS signing secret: $name" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/ccx-signing.keychain-db"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 -d > "$CERTIFICATE_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"

      - name: Build Desktop ${{ matrix.arch }} macOS artifacts
        env:
          BUILD_VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
          MACOS_CODESIGN_IDENTITY: "Developer ID Application: Wang Zhiwei (PZV79TYXCR)"
        run: |
          mkdir -p bin
          rm -f bin/ccx-go
          cp "../backend-go/ccx-darwin-${{ matrix.arch }}" bin/ccx-go
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          VERSION="${BUILD_VERSION#v}"
          wails3 task darwin:package:release ARCH=${{ matrix.arch }} BUILD_VERSION="${VERSION}" BUILD_TIME="${BUILD_TIME}" GIT_COMMIT="${GIT_COMMIT}" MACOS_CODESIGN_IDENTITY="${MACOS_CODESIGN_IDENTITY}" MACOS_NOTARIZE=false
        working-directory: ./desktop

      - name: Upload Desktop ${{ matrix.arch }} macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop-${{ matrix.arch }}-dmg
          path: |
            desktop/bin/CCX-Desktop-*-darwin-${{ matrix.arch }}.dmg
            desktop/bin/CCX-Desktop-*-darwin-${{ matrix.arch }}.zip
          retention-days: 1

  notarize-macos-desktop:
    runs-on: macos-latest
    timeout-minutes: 120
    needs: build-macos-desktop
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, amd64]
    steps:
      - name: Download Desktop ${{ matrix.arch }} DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-desktop-${{ matrix.arch }}-dmg
          path: desktop/bin

      - name: Verify macOS notarization configuration
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=0
          for name in APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required macOS notarization secret: $name" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Notarize Desktop ${{ matrix.arch }} updater ZIP
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ZIP_FILE=$(find desktop/bin -maxdepth 1 -name "CCX-Desktop-*-darwin-${{ matrix.arch }}.zip" -print -quit)
          if [ -z "$ZIP_FILE" ]; then
            echo "Missing updater ZIP for ${{ matrix.arch }}" >&2
            exit 1
          fi
          xcrun notarytool submit "$ZIP_FILE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait
          STAGING=$(mktemp -d)
          trap 'rm -rf "$STAGING"' EXIT
          ditto -x -k "$ZIP_FILE" "$STAGING"
          APP_FILE=$(find "$STAGING" -maxdepth 1 -name "*.app" -type d -print -quit)
          if [ -z "$APP_FILE" ]; then
            echo "Missing app bundle inside updater ZIP" >&2
            exit 1
          fi
          xcrun stapler staple "$APP_FILE"
          xcrun stapler validate "$APP_FILE"
          codesign --verify --deep --strict --verbose=4 "$APP_FILE"
          rm -f "$ZIP_FILE"
          ditto -c -k --sequesterRsrc --keepParent "$APP_FILE" "$ZIP_FILE"
          shasum -a 256 "$ZIP_FILE" | awk '{print $1}' > "$ZIP_FILE.sha256"

      - name: Notarize Desktop ${{ matrix.arch }} DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          DMG_FILE=$(find desktop/bin -maxdepth 1 -name "CCX-Desktop-*-darwin-${{ matrix.arch }}.dmg" -print -quit)
          if [ -z "$DMG_FILE" ]; then
            echo "Missing DMG for ${{ matrix.arch }}" >&2
            exit 1
          fi
          xcrun notarytool submit "$DMG_FILE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait
          xcrun stapler staple "$DMG_FILE"
          xcrun stapler validate "$DMG_FILE"
          shasum -a 256 "$DMG_FILE" | awk '{print $1}' > "$DMG_FILE.sha256"

      - name: Upload notarized Desktop ${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop-${{ matrix.arch }}-notarized
          path: |
            desktop/bin/CCX-Desktop-*-darwin-${{ matrix.arch }}.dmg
            desktop/bin/CCX-Desktop-*-darwin-${{ matrix.arch }}.dmg.sha256
            desktop/bin/CCX-Desktop-*-darwin-${{ matrix.arch }}.zip
            desktop/bin/CCX-Desktop-*-darwin-${{ matrix.arch }}.zip.sha256
          retention-days: 1

  finalize-macos:
    runs-on: ubuntu-latest
    needs: [build-macos-backend, notarize-macos-desktop]
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Download macOS backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-backend
          path: backend-go

      - name: Download notarized Desktop arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-desktop-arm64-notarized
          path: desktop/bin

      - name: Download notarized Desktop amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-desktop-amd64-notarized
          path: desktop/bin

      - name: Generate macOS checksums
        run: |
          {
            shasum -a 256 backend-go/ccx-darwin-arm64 backend-go/ccx-darwin-amd64 \
              | awk '{split($2,a,"/"); $2=a[length(a)]; print}'
            for f in desktop/bin/CCX-Desktop-*-darwin-*.dmg desktop/bin/CCX-Desktop-*-darwin-*.zip; do
              shasum -a 256 "$f" | awk '{split($2,a,"/"); $2=a[length(a)]; print}'
            done
          } > checksums-macos.txt

      - name: Sign macOS checksums
        run: cosign sign-blob checksums-macos.txt --bundle checksums-macos.txt.sigstore.json --yes
        env:
          COSIGN_YES: "true"

      - name: Upload macOS Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            backend-go/ccx-darwin-arm64
            backend-go/ccx-darwin-amd64
            backend-go/ccx-darwin-arm64.sha256
            backend-go/ccx-darwin-amd64.sha256
            desktop/bin/CCX-Desktop-*-darwin-arm64.dmg
            desktop/bin/CCX-Desktop-*-darwin-amd64.dmg
            desktop/bin/CCX-Desktop-*-darwin-arm64.zip
            desktop/bin/CCX-Desktop-*-darwin-amd64.zip
            desktop/bin/CCX-Desktop-*-darwin-arm64.dmg.sha256
            desktop/bin/CCX-Desktop-*-darwin-amd64.dmg.sha256
            desktop/bin/CCX-Desktop-*-darwin-arm64.zip.sha256
            desktop/bin/CCX-Desktop-*-darwin-amd64.zip.sha256
            checksums-macos.txt
            checksums-macos.txt.sigstore.json
          draft: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      SIGNPATH_ORGANIZATION_ID: 4ffeb1d3-df31-4323-a3e9-15fecdcbaad2
      SIGNPATH_PROJECT_SLUG: ccx
      SIGNPATH_SIGNING_POLICY_SLUG: release_certificate_2026
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build Frontend
        run: bun install --frozen-lockfile && bun run build
        working-directory: ./frontend

      - name: Copy Frontend to Backend
        run: |
          rm -rf backend-go/frontend/dist
          mkdir -p backend-go/frontend/dist
          cp -r frontend/dist/* backend-go/frontend/dist/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend-go/go.sum

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Verify SignPath configuration
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          missing=0
          for name in SIGNPATH_API_TOKEN SIGNPATH_ORGANIZATION_ID SIGNPATH_PROJECT_SLUG SIGNPATH_SIGNING_POLICY_SLUG; do
            if [ -z "${!name}" ]; then
              echo "Missing required SignPath setting: ${name}" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build Backend amd64
        run: |
          go mod download
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -ldflags "-s -w -linkmode=internal -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.GitCommit=${{ github.sha }}" -o ccx-windows-amd64.exe
        working-directory: ./backend-go

      - name: Build Backend arm64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -trimpath -buildvcs=false -ldflags "-s -w -linkmode=internal -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.GitCommit=${{ github.sha }}" -o ccx-windows-arm64.exe
        working-directory: ./backend-go

      - name: Sign Backend amd64
        uses: ./.github/actions/signpath-sign
        with:
          file: backend-go/ccx-windows-amd64.exe
          output-directory: .signpath/backend-amd64
          artifact-name: signpath-backend-windows-amd64
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}

      - name: Sign Backend arm64
        uses: ./.github/actions/signpath-sign
        with:
          file: backend-go/ccx-windows-arm64.exe
          output-directory: .signpath/backend-arm64
          artifact-name: signpath-backend-windows-arm64
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}

      - name: Generate checksums
        run: |
          cd backend-go
          sha256sum ccx-windows-amd64.exe | awk '{print $1}' > ccx-windows-amd64.exe.sha256
          sha256sum ccx-windows-arm64.exe | awk '{print $1}' > ccx-windows-arm64.exe.sha256

      - name: Install Wails3 CLI
        run: bash ./scripts/install-wails3.sh

      - name: Install Desktop Frontend Deps
        run: bun install --frozen-lockfile
        working-directory: ./desktop/frontend

      - name: Ensure NSIS is on PATH
        shell: powershell
        run: |
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $nsisPath) -and -not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            Write-Output "NSIS not found, installing via Chocolatey"
            choco install nsis -y
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Chocolatey install failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
          } else {
            Write-Output "NSIS already present"
          }
          $makensis = Get-Command makensis -ErrorAction SilentlyContinue
          if ($makensis) {
            $nsisDir = Split-Path -Parent $makensis.Source
          } elseif (Test-Path $nsisPath) {
            $nsisDir = Split-Path -Parent $nsisPath
          } else {
            Write-Error "NSIS not found after install attempt"
            exit 1
          }
          Write-Output "NSIS directory: $nsisDir"
          echo "$nsisDir" >> $env:GITHUB_PATH

      - name: Build Desktop amd64 executable
        env:
          BUILD_VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p bin
          cp ../backend-go/ccx-windows-amd64.exe bin/ccx-go.exe
          cp bin/ccx-go.exe build/windows/nsis/ccx-go.exe
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          VERSION="${BUILD_VERSION#v}"
          rm -f bin/*installer*.exe bin/*setup*.exe
          wails3 task windows:build ARCH=amd64 PRODUCTION=true BUILD_VERSION="${VERSION}" BUILD_TIME="${BUILD_TIME}" GIT_COMMIT="${GIT_COMMIT}"
        working-directory: ./desktop

      - name: Sign Desktop amd64 executable
        uses: ./.github/actions/signpath-sign
        with:
          file: desktop/bin/ccx-desktop.exe
          output-directory: .signpath/desktop-amd64
          artifact-name: signpath-desktop-windows-amd64-exe
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}

      - name: Verify Desktop amd64 executable signature
        shell: powershell
        run: |
          ./.github/scripts/assert-authenticode-signature.ps1 "desktop/bin/ccx-desktop.exe"

      - name: Build Desktop amd64 NSIS
        env:
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${BUILD_VERSION#v}"
          wails3 task windows:create:nsis:installer:from-binary ARCH=amd64
          INSTALLER=$(find bin -maxdepth 1 -type f \( -iname '*amd64*installer*.exe' -o -iname '*installer*.exe' -o -iname '*setup*.exe' \) | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "Desktop installer not found"
            find bin -maxdepth 1 -type f -name '*.exe' -print
            exit 1
          fi
          mv "$INSTALLER" "bin/CCX-Desktop-${VERSION}-windows-amd64-setup.exe"
          # 立即移出 bin 目录，防止 arm64 步骤的 rm 清除
          mkdir -p release-staging
          mv "bin/CCX-Desktop-${VERSION}-windows-amd64-setup.exe" "release-staging/"
        working-directory: ./desktop

      - name: Sign Desktop amd64 NSIS
        uses: ./.github/actions/signpath-sign
        with:
          file: desktop/release-staging/CCX-Desktop-*-windows-amd64-setup.exe
          output-directory: .signpath/installer-amd64
          artifact-name: signpath-desktop-windows-amd64-nsis
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}

      - name: Generate Desktop amd64 NSIS checksum
        env:
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${BUILD_VERSION#v}"
          sha256sum "release-staging/CCX-Desktop-${VERSION}-windows-amd64-setup.exe" | awk '{print $1}' > "release-staging/CCX-Desktop-${VERSION}-windows-amd64-setup.exe.sha256"
        working-directory: ./desktop

      - name: Build Desktop arm64 executable
        env:
          BUILD_VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          cp ../backend-go/ccx-windows-arm64.exe bin/ccx-go.exe
          cp bin/ccx-go.exe build/windows/nsis/ccx-go.exe
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          VERSION="${BUILD_VERSION#v}"
          rm -f bin/*installer*.exe bin/*setup*.exe
          wails3 task windows:build ARCH=arm64 PRODUCTION=true BUILD_VERSION="${VERSION}" BUILD_TIME="${BUILD_TIME}" GIT_COMMIT="${GIT_COMMIT}"
        working-directory: ./desktop

      - name: Sign Desktop arm64 executable
        uses: ./.github/actions/signpath-sign
        with:
          file: desktop/bin/ccx-desktop.exe
          output-directory: .signpath/desktop-arm64
          artifact-name: signpath-desktop-windows-arm64-exe
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}

      - name: Verify Desktop arm64 executable signature
        shell: powershell
        run: |
          ./.github/scripts/assert-authenticode-signature.ps1 "desktop/bin/ccx-desktop.exe"

      - name: Build Desktop arm64 NSIS
        env:
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${BUILD_VERSION#v}"
          wails3 task windows:create:nsis:installer:from-binary ARCH=arm64
          INSTALLER=$(find bin -maxdepth 1 -type f \( -iname '*arm64*installer*.exe' -o -iname '*installer*.exe' -o -iname '*setup*.exe' \) | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "Desktop installer not found"
            find bin -maxdepth 1 -type f -name '*.exe' -print
            exit 1
          fi
          mv "$INSTALLER" "bin/CCX-Desktop-${VERSION}-windows-arm64-setup.exe"
          # 将 arm64 也移入 staging，与 amd64 汇合
          mkdir -p release-staging
          mv "bin/CCX-Desktop-${VERSION}-windows-arm64-setup.exe" "release-staging/"
        working-directory: ./desktop

      - name: Sign Desktop arm64 NSIS
        uses: ./.github/actions/signpath-sign
        with:
          file: desktop/release-staging/CCX-Desktop-*-windows-arm64-setup.exe
          output-directory: .signpath/installer-arm64
          artifact-name: signpath-desktop-windows-arm64-nsis
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}

      - name: Generate Desktop arm64 NSIS checksum
        env:
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${BUILD_VERSION#v}"
          sha256sum "release-staging/CCX-Desktop-${VERSION}-windows-arm64-setup.exe" | awk '{print $1}' > "release-staging/CCX-Desktop-${VERSION}-windows-arm64-setup.exe.sha256"
        working-directory: ./desktop

      - name: Verify Windows Authenticode signatures
        shell: powershell
        env:
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          $version = $env:BUILD_VERSION -replace '^v', ''
          $files = @(
            "backend-go/ccx-windows-amd64.exe",
            "backend-go/ccx-windows-arm64.exe",
            "desktop/release-staging/CCX-Desktop-$version-windows-amd64-setup.exe",
            "desktop/release-staging/CCX-Desktop-$version-windows-arm64-setup.exe"
          )
          ./.github/scripts/assert-authenticode-signature.ps1 $files

      - name: Build Desktop amd64 Store MSIX
        env:
          BUILD_VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
          MSIX_PACKAGE_NAME: ${{ vars.MSIX_PACKAGE_NAME || 'CCX.Desktop' }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER || 'CN=CCX' }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.MSIX_PUBLISHER_DISPLAY_NAME || 'CCX' }}
          MSIX_DISPLAY_NAME: ${{ vars.MSIX_DISPLAY_NAME || 'CCX Desktop' }}
          MSIX_DESCRIPTION: ${{ vars.MSIX_DESCRIPTION || 'Desktop shell for the CCX core gateway service.' }}
        run: |
          cp ../backend-go/ccx-windows-amd64.exe bin/ccx-go.exe
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          VERSION="${BUILD_VERSION#v}"
          rm -f bin/*.msix
          wails3 task windows:package FORMAT=msix ARCH=amd64 BUILD_VERSION="${VERSION}" BUILD_TIME="${BUILD_TIME}" GIT_COMMIT="${GIT_COMMIT}" DISTRIBUTION=store MSIX_PACKAGE_NAME="${MSIX_PACKAGE_NAME}" MSIX_PUBLISHER="${MSIX_PUBLISHER}" MSIX_PUBLISHER_DISPLAY_NAME="${MSIX_PUBLISHER_DISPLAY_NAME}" MSIX_DISPLAY_NAME="${MSIX_DISPLAY_NAME}" MSIX_DESCRIPTION="${MSIX_DESCRIPTION}"
          mv "bin/ccx-desktop-amd64.msix" "bin/CCX-Desktop-${VERSION}-windows-amd64-store.msix"
          mkdir -p release-staging
          mv "bin/CCX-Desktop-${VERSION}-windows-amd64-store.msix" "release-staging/"
          sha256sum "release-staging/CCX-Desktop-${VERSION}-windows-amd64-store.msix" | awk '{print $1}' > "release-staging/CCX-Desktop-${VERSION}-windows-amd64-store.msix.sha256"
        working-directory: ./desktop

      - name: Build Desktop arm64 Store MSIX
        env:
          BUILD_VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
          MSIX_PACKAGE_NAME: ${{ vars.MSIX_PACKAGE_NAME || 'CCX.Desktop' }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER || 'CN=CCX' }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.MSIX_PUBLISHER_DISPLAY_NAME || 'CCX' }}
          MSIX_DISPLAY_NAME: ${{ vars.MSIX_DISPLAY_NAME || 'CCX Desktop' }}
          MSIX_DESCRIPTION: ${{ vars.MSIX_DESCRIPTION || 'Desktop shell for the CCX core gateway service.' }}
        run: |
          cp ../backend-go/ccx-windows-arm64.exe bin/ccx-go.exe
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          VERSION="${BUILD_VERSION#v}"
          rm -f bin/*.msix
          wails3 task windows:package FORMAT=msix ARCH=arm64 BUILD_VERSION="${VERSION}" BUILD_TIME="${BUILD_TIME}" GIT_COMMIT="${GIT_COMMIT}" DISTRIBUTION=store MSIX_PACKAGE_NAME="${MSIX_PACKAGE_NAME}" MSIX_PUBLISHER="${MSIX_PUBLISHER}" MSIX_PUBLISHER_DISPLAY_NAME="${MSIX_PUBLISHER_DISPLAY_NAME}" MSIX_DISPLAY_NAME="${MSIX_DISPLAY_NAME}" MSIX_DESCRIPTION="${MSIX_DESCRIPTION}"
          mv "bin/ccx-desktop-arm64.msix" "bin/CCX-Desktop-${VERSION}-windows-arm64-store.msix"
          mkdir -p release-staging
          mv "bin/CCX-Desktop-${VERSION}-windows-arm64-store.msix" "release-staging/"
          sha256sum "release-staging/CCX-Desktop-${VERSION}-windows-arm64-store.msix" | awk '{print $1}' > "release-staging/CCX-Desktop-${VERSION}-windows-arm64-store.msix.sha256"
        working-directory: ./desktop

      - name: Generate Windows checksums
        run: |
          {
            sha256sum backend-go/ccx-windows-amd64.exe backend-go/ccx-windows-arm64.exe \
              | awk '{split($2,a,"/"); $2=a[length(a)]; print}'
            for f in desktop/release-staging/CCX-Desktop-*-windows-*-setup.exe desktop/release-staging/CCX-Desktop-*-windows-*-store.msix; do
              sha256sum "$f" | awk '{split($2,a,"/"); $2=a[length(a)]; print}'
            done
          } > checksums-windows.txt

      - name: Sign Windows checksums
        run: cosign sign-blob checksums-windows.txt --bundle checksums-windows.txt.sigstore.json --yes
        env:
          COSIGN_YES: "true"

      - name: Upload Windows Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            backend-go/ccx-windows-amd64.exe
            backend-go/ccx-windows-arm64.exe
            backend-go/ccx-windows-amd64.exe.sha256
            backend-go/ccx-windows-arm64.exe.sha256
            desktop/release-staging/CCX-Desktop-*-windows-amd64-setup.exe
            desktop/release-staging/CCX-Desktop-*-windows-arm64-setup.exe
            desktop/release-staging/CCX-Desktop-*-windows-amd64-setup.exe.sha256
            desktop/release-staging/CCX-Desktop-*-windows-arm64-setup.exe.sha256
            desktop/release-staging/CCX-Desktop-*-windows-amd64-store.msix
            desktop/release-staging/CCX-Desktop-*-windows-arm64-store.msix
            desktop/release-staging/CCX-Desktop-*-windows-amd64-store.msix.sha256
            desktop/release-staging/CCX-Desktop-*-windows-arm64-store.msix.sha256
            checksums-windows.txt
            checksums-windows.txt.sigstore.json
          draft: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build Frontend
        run: bun install --frozen-lockfile && bun run build
        working-directory: ./frontend

      - name: Copy Frontend to Backend
        run: |
          rm -rf backend-go/frontend/dist
          mkdir -p backend-go/frontend/dist
          cp -r frontend/dist/* backend-go/frontend/dist/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend-go/go.sum

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Build Backend for amd64
        run: |
          go mod download
          CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.GitCommit=${{ github.sha }}" -o ccx-linux-amd64
        working-directory: ./backend-go

      - name: Build Backend for arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.GitCommit=${{ github.sha }}" -o ccx-linux-arm64
        working-directory: ./backend-go

      - name: Generate checksums
        run: |
          cd backend-go
          sha256sum ccx-linux-amd64 | awk '{print $1}' > ccx-linux-amd64.sha256
          sha256sum ccx-linux-arm64 | awk '{print $1}' > ccx-linux-arm64.sha256

      - name: Install Wails3 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev webkitgtk-6.0 libfuse2 pkg-config build-essential

      - name: Install Wails3 CLI
        run: bash ./scripts/install-wails3.sh

      - name: Install Desktop Frontend Deps
        run: bun install --frozen-lockfile
        working-directory: ./desktop/frontend

      - name: Build Desktop amd64 AppImage
        env:
          BUILD_VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p bin
          cp ../backend-go/ccx-linux-amd64 bin/ccx-go
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          VERSION="${BUILD_VERSION#v}"
          wails3 task linux:create:appimage ARCH=amd64 BUILD_VERSION="${VERSION}" BUILD_TIME="${BUILD_TIME}" GIT_COMMIT="${GIT_COMMIT}"
          APPIMAGE=$(find bin -maxdepth 1 -iname '*.AppImage' | head -1)
          mv "$APPIMAGE" "bin/CCX-Desktop-${VERSION}-linux-amd64.AppImage"
          sha256sum "bin/CCX-Desktop-${VERSION}-linux-amd64.AppImage" | awk '{print $1}' > "bin/CCX-Desktop-${VERSION}-linux-amd64.AppImage.sha256"
        working-directory: ./desktop

      - name: Generate Linux checksums
        run: |
          {
            sha256sum backend-go/ccx-linux-amd64 backend-go/ccx-linux-arm64 \
              | awk '{split($2,a,"/"); $2=a[length(a)]; print}'
            for f in desktop/bin/CCX-Desktop-*-linux-*.AppImage; do
              sha256sum "$f" | awk '{split($2,a,"/"); $2=a[length(a)]; print}'
            done
          } > checksums-linux.txt

      - name: Sign Linux checksums
        run: cosign sign-blob checksums-linux.txt --bundle checksums-linux.txt.sigstore.json --yes
        env:
          COSIGN_YES: "true"

      - name: Upload Linux Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            backend-go/ccx-linux-amd64
            backend-go/ccx-linux-arm64
            backend-go/ccx-linux-amd64.sha256
            backend-go/ccx-linux-arm64.sha256
            desktop/bin/CCX-Desktop-*-linux-amd64.AppImage
            desktop/bin/CCX-Desktop-*-linux-amd64.AppImage.sha256
            checksums-linux.txt
            checksums-linux.txt.sigstore.json
          draft: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64-desktop:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build Frontend
        run: bun install --frozen-lockfile && bun run build
        working-directory: ./frontend

      - name: Copy Frontend to Backend
        run: |
          rm -rf backend-go/frontend/dist
          mkdir -p backend-go/frontend/dist
          cp -r frontend/dist/* backend-go/frontend/dist/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend-go/go.sum

      - name: Build Backend arm64
        run: |
          go mod download
          CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -X main.GitCommit=${{ github.sha }}" -o ccx-linux-arm64
        working-directory: ./backend-go

      - name: Install Wails3 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev webkitgtk-6.0 libfuse2 pkg-config build-essential

      - name: Install Wails3 CLI
        run: bash ./scripts/install-wails3.sh

      - name: Install Desktop Frontend Deps
        run: bun install --frozen-lockfile
        working-directory: ./desktop/frontend

      - name: Build Desktop arm64 AppImage
        env:
          BUILD_VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p bin
          cp ../backend-go/ccx-linux-arm64 bin/ccx-go
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          VERSION="${BUILD_VERSION#v}"
          wails3 task linux:create:appimage ARCH=arm64 BUILD_VERSION="${VERSION}" BUILD_TIME="${BUILD_TIME}" GIT_COMMIT="${GIT_COMMIT}"
          APPIMAGE=$(find bin -maxdepth 1 -iname '*.AppImage' | head -1)
          mv "$APPIMAGE" "bin/CCX-Desktop-${VERSION}-linux-arm64.AppImage"
          sha256sum "bin/CCX-Desktop-${VERSION}-linux-arm64.AppImage" | awk '{print $1}' > "bin/CCX-Desktop-${VERSION}-linux-arm64.AppImage.sha256"
        working-directory: ./desktop

      - name: Generate Linux arm64 checksums
        run: |
          cd desktop/bin
          sha256sum CCX-Desktop-*-linux-arm64.AppImage > checksums-linux-arm64.txt

      - name: Upload Linux arm64 Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            desktop/bin/CCX-Desktop-*-linux-arm64.AppImage
            desktop/bin/CCX-Desktop-*-linux-arm64.AppImage.sha256
          draft: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    runs-on: ubuntu-latest
    needs: [finalize-macos, build-windows, build-linux, build-linux-arm64-desktop]
    steps:
      - name: Notify release ready
        run: echo "All builds complete. Draft release is ready for review."
